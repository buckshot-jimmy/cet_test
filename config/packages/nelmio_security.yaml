nelmio_security:
    # prevents framing of the entire site
    clickjacking:
        paths:
            '^/.*': DENY
            '^/local/': SAMEORIGIN

    permissions_policy:
        policies:
            camera: [ ]
            microphone: [ ]
            geolocation: [ ]
            payment: [ ]
            usb: [ ]
            interest_cohort: [ ]

#    forced_ssl:
#        enabled: true
#        hsts_max_age: 31536000
#        hsts_subdomains: true
#        hsts_preload: true

    # disables content type sniffing for script resources
    content_type:
        nosniff: true

    # Send a full URL in the `Referer` header when performing a same-origin request,
    # only send the origin of the document to secure destination (HTTPS->HTTPS),
    # and send no header to a less secure destination (HTTPS->HTTP).
    # If `strict-origin-when-cross-origin` is not supported, use `no-referrer` policy,
    # no referrer information is sent along with requests.
    referrer_policy:
        enabled: true
        policies:
            - 'no-referrer'
            - 'strict-origin-when-cross-origin'

    csp:
        enforce:
            # Block everything unless explicitly allowed
            default-src:
                - 'self'

            # Strict script policy: only self + nonce
            level1_fallback: false
            script-src:
                - 'self'
                - 'nonce'
                - 'strict-dynamic'

            # Styles: allow Google Fonts, no inline styles
            style-src:
                - 'self'
                - 'nonce'
                - 'https://fonts.googleapis.com'

            # Fonts: only trusted sources
            font-src:
                - 'self'
                - 'https://fonts.gstatic.com'
                - 'data:'

            # Images: self + data URIs
            img-src:
                - 'self'
                - 'data:'

            # No plugins, no Flash, no PDFs
            object-src:
                - 'none'

            # Prevent clickjacking
            frame-ancestors:
                - 'none'

            # Prevent loading insecure HTTP content
            block-all-mixed-content: true

            # Prevent form submissions to external sites
            form-action:
                - 'self'

            # Prevent external workers unless allowed
            worker-src:
                - 'self'

            # Prevent external connections unless allowed
            connect-src:
                - 'self'

    cross_origin_isolation:
        enabled: true
        paths:
            '^/.*':
                coep: require-corp
                coop: same-origin
                corp: same-origin