<VirtualHost *:443>
    DocumentRoot "C:/Apache24/htdocs/CET/public"
    ServerName cet.local

    SSLEngine on
    SSLCertificateFile "C:/Apache24/htdocs/CET/certs/cet.local+2.pem"
    SSLCertificateKeyFile "C:/Apache24/htdocs/CET/certs/cet.local+2-key.pem"

    <Directory "C:/Apache24/htdocs/CET/public">
	Options Indexes FollowSymLinks ExecCGI
        AllowOverride All
    	Require all granted
        FallbackResource /index.php
    </Directory>
</VirtualHost>